<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calcul d'Intérêts</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo">Calcul d'Intérêts</div>
    </header>

    <main>
        <section id="input-section">
            <h2>Informations pour le calcul</h2>
            <form id="interest-form">
                <div class="form-group">
                    <label for="doc-type">Type de document</label>
                    <input type="text" id="doc-type" value="Ordonnance exécutoire">
                </div>
                <div class="form-group">
                    <label for="doc-num">N° document</label>
                    <input type="text" id="doc-num" value="369/04">
                </div>
                <div class="form-group">
                    <label for="doc-date">Date document</label>
                    <input type="date" id="doc-date" value="2004-08-27">
                </div>
                <div class="form-group">
                    <label for="principal">Principal HTVA (FCFA)</label>
                    <input type="number" id="principal" value="11451793">
                </div>
                <div class="form-group">
                    <label for="contractor">Contractant</label>
                    <input type="text" id="contractor" value="LAMINE NARRO, MOUSTAPHA TAÏB ET MOUSSA">
                </div>
                <div class="form-group">
                    <label for="debt-date">Date de la dette</label>
                    <input type="date" id="debt-date" value="2019-01-01">
                </div>
                <button type="submit">Calculer</button>
            </form>
        </section>

        <section id="result-section">
            <h2>Résultat du Calcul</h2>
            <div id="result-output">
                <!-- Les résultats du calcul seront affichés ici -->
            </div>
            <button id="export-pdf" style="display: none;">Exporter en PDF</button>
        </section>
    </main>

    <footer>
        <p>&copy; 2024 Application de Calcul d'Intérêts. Tous droits réservés.</p>
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
